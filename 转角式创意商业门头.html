<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>转角式创意门头生成器 · 古月AI</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Microsoft YaHei",sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px;
}

/* 标题 */
.title{
  font-size:32px;
  font-weight:bold;
  margin-bottom:10px;
  background:linear-gradient(90deg,#00f2fe,#4facfe,#00f2fe);
  -webkit-background-clip:text;
  color:transparent;
}

.subtitle{
  font-size:14px;
  opacity:.8;
  margin-bottom:30px;
}

/* 输入区 */
.input-box{
  width:90%;
  max-width:800px;
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

input::placeholder{
  color:#ccc;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
  transition:.3s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* 输出区 */
.result{
  width:90%;
  max-width:1000px;
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* 每条提示词 */
.card{
  background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));
  padding:16px;
  border-radius:12px;
  position:relative;
  line-height:1.6;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  transition:.3s;
}

.card:hover{
  transform:translateY(-3px);
}

/* 复制按钮 */
.copy-btn{
  position:absolute;
  top:10px;
  right:10px;
  padding:6px 10px;
  font-size:12px;
  border-radius:6px;
  background:linear-gradient(135deg,#ff7e5f,#feb47b);
  cursor:pointer;
}

/* 滚动条优化 */
::-webkit-scrollbar{
  width:6px;
}
::-webkit-scrollbar-thumb{
  background:#888;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="title">转角式创意门头生成器</div>
<div class="subtitle">古月AI智能体 · 真实可施工 · 转角门头设计专用</div>

<div class="input-box">
  <input id="input" placeholder="请输入：行业 + 门头名称（例如：咖啡店 星角咖啡）">
  <button onclick="generate()">生成方案</button>
</div>

<div class="result" id="result"></div>

<script>

function generate(){
  const val = document.getElementById("input").value;
  if(!val){
    alert("请输入行业+门头名称");
    return;
  }

  const resultBox = document.getElementById("result");
  resultBox.innerHTML = "";

  const styles = [
    "现代极简","轻奢金属","工业风","潮流网红","未来科技",
    "自然木质","艺术装置风","几何解构","高级灰设计","品牌连锁风"
  ];

  const materials = [
    "铝单板转印","GRC构件","发光冲孔板","艺术涂料","金属拉丝铝板",
    "微水泥","玻璃幕墙","不锈钢包边","亚克力板","石材饰面"
  ];

  const slogans = [
    "城市灵感空间","转角遇见美好","年轻人的聚集地",
    "生活方式集合","创意无边界","潮流新地标",
    "品质生活体验","发现你的灵感","城市能量中心","让空间会说话"
  ];

  for(let i=0;i<20;i++){

    let text = `
${val}，${styles[i%styles.length]}转角式创意门头设计，白天自然光环境，街道转角建筑结构，
完整展示门头正立面和转角侧面，正面平视视角略带转角透视，无任何遮挡，
利用建筑转角进行双面延伸设计，视觉连贯，吸引力强，
材质采用${materials[i%materials.length]}结合发光冲孔板与艺术涂料，
结构真实可施工，龙骨支撑合理，
门头包含品牌名称+主营品类+标语「${slogans[i%10]}」，
双面字体排布，艺术字体设计，
亚克力通体发光字结合嵌入式线条灯与转角轮廓灯带，
日间清晰可见，层次丰富，
8K高清，商业写实效果图，真实街景环境，可直接施工参考
    `;

    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = text + `<div class="copy-btn" onclick="copyText(this)">复制</div>`;

    resultBox.appendChild(div);
  }
}

function copyText(btn){
  const text = btn.parentNode.innerText.replace("复制","");
  navigator.clipboard.writeText(text);

  btn.innerText = "已复制";
  setTimeout(()=>{
    btn.innerText = "复制";
  },2000);
}

</script>

</body>
</html>
